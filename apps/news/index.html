<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mannamplace news</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="wrap">
        <header>
            <h1>뉴스 로고</h1>
            <div id="search">
                <input type="text" placeholder="뉴스 검색">
                <button>검색</button>
            </div>
        </header>
        
        <nav>
            <ul>
                <li>정치</li>
                <li>경제</li>
                <li>사회</li>
                <li>스포츠</li>
                <li>연예</li>
            </ul>
        </nav>
        
        <div id="container">
            <section id="main-content">
                <div id="news-stand">
                    <h2>뉴스스탠드</h2>
                    <div class="news-grid">
                        <div class="news-item">연합뉴스</div>
                        <div class="news-item">조선일보</div>
                        <div class="news-item">중앙일보</div>
                        <div class="news-item">동아일보</div>
                        <div class="news-item">한겨레</div>
                        <div class="news-item">YTN</div>
                    </div>
                </div>
                
                <div id="headlines">
                    <h2>헤드라인 뉴스</h2>
                    <article class="big-news">
                        <h3>주요 뉴스 제목 1</h3>
                        <p>주요 내용 요약...</p>
                    </article>
                    <div class="sub-news">
                        <article>서브 뉴스 1</article>
                        <article>서브 뉴스 2</article>
                        <article>서브 뉴스 3</article>
                    </div>
                </div>
            </section>
            
            <aside id="sidebar">
                <div id="quick-menu">로그인 | 날씨 | 주식</div>
                <div id="ads">광고 배너</div>
                <div id="ranking">
                    <h3>실시간 핫이슈</h3>
                    <ol>
                        <li>이슈 1</li>
                        <li>이슈 2</li>
                        <li>이슈 3</li>
                    </ol>
                </div>
            </aside>
        </div>
        
        <footer>
            <div>회사정보 | 이용약관 | 이벤트</div>
        </footer>
    </div>
</body>
</html>
